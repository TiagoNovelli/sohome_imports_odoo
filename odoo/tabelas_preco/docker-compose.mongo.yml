services:
  mongo:
    image: mongo:7
    container_name: tabelas_preco_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: tabelas_preco_logs
    ports:
      - "27017:27017"
    volumes:
      - tabelas_preco_mongo_data:/data/db

  mongo-express:
    image: mongo-express:1
    container_name: tabelas_preco_mongo_express
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: admin123
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
    ports:
      - "8081:8081"

volumes:
  tabelas_preco_mongo_data:
